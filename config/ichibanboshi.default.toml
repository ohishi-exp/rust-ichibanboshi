# host / password / introspect_secret の実値は repo に置かず、デプロイ先の
# ichibanboshi.toml でのみ設定する (secrets-inventory 参照)。
# [kyuyo]
# host = "<給与PC-HOST>"
# port = 14330
# user = "kyuyo_reader"
# password = "<kyuyo_reader パスワード>"
# auth_worker_origin = "<auth-worker origin (実稼働は auth-staging 側)>"
# introspect_secret = "<INTERNAL_SHARED_SECRET_KYUYO>"
# app_origin = "https://dtako.ippoan.org"
# allowed_emails = ["<許可する email>"]
