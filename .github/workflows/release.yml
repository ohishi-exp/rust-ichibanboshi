name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build MSI and publish GitHub Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          shared-key: "release"

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --release

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Cache cargo-wix
        id: cache-wix
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-wix*
          key: cargo-wix-0.3.9

      - name: Install cargo-wix
        if: steps.cache-wix.outputs.cache-hit != 'true'
        run: cargo install cargo-wix --version "0.3.9" --locked

      - name: Add WiX v3 to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/WiX Toolset v3.11/bin" >> "$GITHUB_PATH"

      - name: Build MSI installer
        run: cargo wix --target x86_64-pc-windows-msvc --no-build --nocapture

      - name: Rename MSI for release
        shell: bash
        run: |
          for f in target/wix/*.msi; do
            mv "$f" "target/wix/ichibanboshi-${{ steps.version.outputs.version }}-x86_64.msi"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "一番星売上API v${{ steps.version.outputs.version }}"
          body: |
            ## 一番星売上データ API v${{ steps.version.outputs.version }}

            ### インストール方法
            1. `ichibanboshi-${{ steps.version.outputs.version }}-x86_64.msi` をダウンロード
            2. MSI を実行してインストール
            3. `C:\Program Files\IchibanboshiSales\ichibanboshi.toml` を編集（jwt_secret, DB接続情報）
            4. サービスが自動起動します

            ### コンソールモードで実行
            ```
            ichibanboshi.exe --console
            ```

            ### ファイル
            - `.msi` — Windows インストーラー（サービス登録 + 設定ファイル込み）
            - `.exe` — スタンドアロン実行ファイル（コンソールモードで手動実行用）
          files: |
            target/x86_64-pc-windows-msvc/release/ichibanboshi.exe
            target/wix/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
