name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test + Coverage regression check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests
        run: cargo test

      - name: Coverage regression check
        run: bash scripts/check_coverage_100.sh

      - name: Upload coverage text (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-cache/text-*.txt
          retention-days: 7
          if-no-files-found: ignore

  # CI green 後に squash auto-merge を queue する (org 標準の caller-composed
  # pattern、go-cloudrun-proxy / rust-flickr と同形)。ohishi-exp org に
  # CI_APP_ID / CI_APP_PRIVATE_KEY が投入されたため self-contained job から
  # reusable に復帰 (Refs ippoan/secrets-inventory-gcp#51 — App installation
  # token mode 経由で sync 投入)。deploy job は本 repo の ci.yml に無い
  # (本番反映は手元 ./deploy.sh) ため needs は test のみ。
  auto-merge:
    if: github.event_name == 'pull_request'
    needs: [test]
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    # auto-merge.yml は GitHub App credential (CI_APP_ID / CI_APP_PRIVATE_KEY、
    # org secrets) を必須とするため secrets: inherit が必要。
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
