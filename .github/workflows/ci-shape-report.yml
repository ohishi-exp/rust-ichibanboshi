name: ci-shape-report

# `.github/workflows/**` 変更時に自 repo の workflow shape を ci-dashboard
# `/webhooks/ci-shape` に POST する。`/ci-matrix` UI のデータ source。
# Refs ippoan/ci-dashboard#378。
#
# cross-org caller (ohishi-exp / yhonda-ohishi) のため secret を明示渡し
# (= ippoan/ci-workflows reusable は別 org 扱いで `secrets: inherit` が効かない)。

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  report:
    uses: ippoan/ci-workflows/.github/workflows/ci-shape-report.yml@main
    secrets:
      RELEASE_WAVE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
